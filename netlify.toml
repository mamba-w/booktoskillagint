# Next.js su Netlify: base = cartella web. NON impostare "Publish directory" = web nell'UI.
[build]
  base = "web"
  command = "npm ci && npm run build"
  # Relativo a base (web/.next). Il plugin Next.js completa il deploy.
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Variabili in Netlify UI → Environment variables:
# OPENAI_API_KEY, ELEVENLABS_API_KEY, OPENAI_MODEL, ELEVENLABS_* (opzionali)
